<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>EL RITUAL ROTO — GM Reference Panels</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<style>
  :root {
    --paper: #f5f0e4;
    --paper-2: #ece5d3;
    --ink: #1f1a14;
    --ink-soft: #4a4036;
    --ochre: #c47a2c;
    --gap: #d94a2c;
    --rule: rgba(31, 26, 20, 0.18);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: ui-monospace, "Courier New", monospace;
    -webkit-font-smoothing: antialiased;
  }
  body {
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(196, 122, 44, 0.06), transparent 60%),
      radial-gradient(ellipse at 90% 90%, rgba(31, 26, 20, 0.05), transparent 60%);
  }

  .app {
    max-width: 1280px;
    margin: 0 auto;
    padding: 40px 32px 80px;
  }

  /* ── Header ─────────────────────────────────────────────── */
  .hd {
    border-bottom: 1px solid var(--rule);
    padding-bottom: 18px;
    margin-bottom: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .hd .eyebrow {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    opacity: 0.75;
  }
  .hd h1 {
    font-family: "Cormorant Garamond", serif;
    font-weight: 600;
    font-size: 36px;
    line-height: 1;
    margin: 0;
    letter-spacing: 0.01em;
  }
  .hd h1 em {
    font-style: italic;
    color: var(--ochre);
    font-weight: 400;
  }
  .hd .meta {
    display: flex;
    gap: 18px;
    font-size: 11px;
    color: var(--ink-soft);
    opacity: 0.85;
  }
  .hd .meta b { font-weight: 500; color: var(--ink); }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    padding: 8px 0 0;
    font-size: 10.5px;
    color: var(--ink-soft);
  }
  .legend .item { display: inline-flex; align-items: center; gap: 6px; }
  .legend .dot {
    width: 10px; height: 10px; border-radius: 50%;
    display: inline-block;
    border: 0.5px solid var(--ink);
  }
  .legend .dot.npc     { background: var(--ink); border: 0; }
  .legend .dot.pc      { background: #4a5a8c; }
  .legend .dot.focus   { background: var(--ochre); }
  .legend .dot.leader  { background: var(--ink); box-shadow: 0 0 0 2px var(--paper), 0 0 0 3px var(--ink); }
  .legend .dot.stopped { background: transparent; border: 1px dashed var(--ink); }
  .legend .dot.injured { background: transparent; border: 1px solid #4a5a8c; position: relative; }
  .legend .dot.injured::before, .legend .dot.injured::after {
    content: ""; position: absolute; left: 1px; right: 1px; top: 50%;
    height: 1px; background: #4a5a8c; transform: translateY(-0.5px) rotate(45deg);
  }
  .legend .dot.injured::after { transform: translateY(-0.5px) rotate(-45deg); }

  /* ── Tabs ───────────────────────────────────────────────── */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 28px;
  }
  .tab {
    appearance: none;
    background: transparent;
    border: 0;
    color: var(--ink-soft);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.04em;
    padding: 12px 14px 12px;
    cursor: default;
    position: relative;
    display: flex;
    align-items: center;
    gap: 6px;
    border-bottom: 1.5px solid transparent;
    margin-bottom: -1px;
    transition: color .12s;
  }
  .tab:hover { color: var(--ink); }
  .tab.on {
    color: var(--ink);
    border-bottom-color: var(--ochre);
    font-weight: 500;
  }
  .tab .num {
    font-size: 9px;
    color: var(--ink-soft);
    opacity: 0.55;
    font-variant-numeric: tabular-nums;
  }
  .tab.on .num { color: var(--ochre); opacity: 1; }

  /* ── Sketch frame ───────────────────────────────────────── */
  .panel {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .panel-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--rule);
  }
  .panel-head .title {
    font-family: "Cormorant Garamond", serif;
    font-size: 24px;
    font-weight: 600;
    margin: 0;
  }
  .panel-head .title em {
    font-style: italic;
    color: var(--ochre);
    font-weight: 400;
    margin-left: 6px;
  }
  .panel-head .sub {
    font-size: 11px;
    color: var(--ink-soft);
    max-width: 50%;
    text-align: right;
    line-height: 1.5;
  }

  .sketch-row {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 28px;
    align-items: start;
  }
  @media (max-width: 880px) {
    .sketch-row { grid-template-columns: 1fr; }
  }

  .sketch {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 2px;
    box-shadow:
      0 0 0 6px var(--paper) inset,
      0 4px 18px rgba(31, 26, 20, 0.08),
      0 1px 0 rgba(255, 255, 255, 0.6) inset;
    overflow: hidden;
    position: relative;
  }
  .sketch::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(0deg, transparent 0, transparent 22px, rgba(31, 26, 20, 0.025) 22px, rgba(31, 26, 20, 0.025) 23px);
    mix-blend-mode: multiply;
    z-index: 1;
  }
  .sketch > svg { position: relative; z-index: 0; }

  .sketch-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    font-size: 10px;
    color: var(--ink-soft);
    border-top: 1px dashed var(--rule);
    background: var(--paper-2);
    position: relative;
    z-index: 2;
  }
  .sketch-meta .corner { font-family: cursive; font-size: 13px; color: var(--ink); }
  .sketch-meta .aspect {
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.08em;
  }

  /* ── Side: caption + variant selector ──────────────────── */
  .side {
    display: flex;
    flex-direction: column;
    gap: 16px;
    font-size: 12px;
    line-height: 1.55;
  }
  .side .label-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
    border-bottom: 1px dashed var(--rule);
    padding-bottom: 4px;
  }
  .side .label-row .k {
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .side .caption {
    font-family: "Cormorant Garamond", serif;
    font-size: 17px;
    font-style: italic;
    line-height: 1.4;
    color: var(--ink);
  }
  .side .note {
    color: var(--ink-soft);
    font-size: 11.5px;
    line-height: 1.65;
  }
  .side .note strong { color: var(--ink); font-weight: 600; }

  .variant-pick {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .variant-pick .dots {
    display: flex;
    gap: 6px;
  }
  .variant-pick button {
    appearance: none;
    flex: 1;
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    font-family: inherit;
    font-size: 10px;
    padding: 8px 6px;
    cursor: default;
    border-radius: 2px;
    letter-spacing: 0.04em;
    text-align: left;
    line-height: 1.3;
    transition: all .12s;
  }
  .variant-pick button:hover {
    border-color: var(--ink);
    color: var(--ink);
  }
  .variant-pick button.on {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .variant-pick button .vn {
    font-family: cursive;
    font-size: 14px;
    display: block;
    line-height: 1;
    margin-bottom: 2px;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .tag {
    font-size: 9px;
    padding: 3px 6px;
    border: 1px solid var(--rule);
    border-radius: 999px;
    color: var(--ink-soft);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .tag.ochre { color: var(--ochre); border-color: rgba(196, 122, 44, 0.35); }
  .tag.gap   { color: var(--gap); border-color: rgba(217, 74, 44, 0.35); }

  /* multi-sketch grid for diagram studies (multiple sub-plates) */
  .multi {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  @media (max-width: 880px) { .multi { grid-template-columns: 1fr; } }

  .multi .sketch { box-shadow: 0 0 0 4px var(--paper) inset, 0 2px 10px rgba(31, 26, 20, 0.06); }

  .scene-toc {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
    color: var(--ink-soft);
    font-size: 10px;
    letter-spacing: 0.06em;
    display: flex;
    justify-content: space-between;
    text-transform: uppercase;
  }

  /* tab letter glyphs */
  .glyph {
    width: 14px; height: 14px;
    flex-shrink: 0;
    color: currentColor;
  }
</style>
</head>
<body>

<div id="root"><p style="font-family:Georgia,serif;padding:2rem;opacity:0.5"><em>El Ritual Roto — GM Reference</em><br><br>Source JSX files (tweaks-panel.jsx, scenes-a.jsx, scenes-b.jsx, diagrams.jsx) were not saved with this export. Content is preserved in <strong>campaign.md</strong>, Chapters 8–9.</p></div>

// ── Sketch dispatcher ────────────────────────────────────────────────────────
function SceneSketch({ scene, variant, ochre, eastGap }) {
  const map = {
    s1: Scene1, s2: Scene2, s3: Scene3, s4: Scene4,
    s5: Scene5, s6: Scene6, s7: Scene7,
  };
  const C = map[scene.id];
  if (!C) return null;
  return <C variant={variant} ochre={ochre} eastGap={eastGap} />;
}

function Glyph({ id }) {
  // simple monogram per tab
  const text = {
    diagram: '◯', s1: '∇', s2: '◉', s3: '▷', s4: '⫶', s5: '✕', s6: '✜', s7: '◐',
  }[id] || '·';
  return <span className="glyph" style={{ fontSize: 12, display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>{text}</span>;
}

// ── Diagram tab — multi-plate layout ─────────────────────────────────────────

    <div className="panel">
      <div className="panel-head">
        <div>

        </div>
        <p className="sub">{scene.sub}</p>

            <span className="aspect">PLAN · 1:1.43</span>
          </div>
        </div>

        <aside className="side">
          <div className="label-row">
            <span className="k">Caption</span>
            <span className="k">{v.vn} / {scene.variants.length}</span>
          </div>
          <div className="caption">"{v.caption}"</div>
          <div className="note">{v.note}</div>

          <div className="label-row" style={{ marginTop: 6 }}>
            <span className="k">Variants</span>
            <span className="k" style={{opacity:0.5}}>cycle</span>
          </div>
          <div className="variant-pick">
            <div className="dots">
              {scene.variants.map((vv, i) => (

            <span className="k">Tags</span>
          </div>

      <div className="panel-head" style={{ marginTop: 8 }}>
        <div>
          <h2 className="title" style={{ fontSize: 20 }}>Companion studies<em>hand-marks & chant</em></h2>

// ── Generic scene panel ──────────────────────────────────────────────────────
function ScenePanel({ scene, ochre, eastGap, variant, setVariant }) {
  const v = scene.variants[variant];
  return (
    <div className="panel">
      <div className="panel-head">

          <div className="label-row">
            <span className="k">Caption</span>

          <div className="caption">"{v.caption}"</div>

            <span className="k" style={{ opacity: 0.5 }}>cycle</span>
          </div>
          <div className="variant-pick">
            <div className="dots">
              {scene.variants.map((vv, i) => (
                <button key={vv.vn} className={i === variant ? 'on' : ''} onClick={() => setVariant(i)}>
                  <span className="vn">{vv.vn}</span>{vv.label}
                </button>
              ))}
            </div>
          </div>

          <div className="label-row" style={{ marginTop: 6 }}>
            <span className="k">Atmosphere</span>
          </div>
          <div className="tags">
            <span className="tag">{scene.aspect.split('·')[0].trim()}</span>
            <span className="tag ochre">ochre lines</span>
            <span className="tag">indigo / amber</span>
            {scene.id === 's4' || scene.id === 's5' || scene.id === 's6' ? <span className="tag gap">east gap</span> : null}
            {scene.id === 's5' || scene.id === 's6' ? <span className="tag">hound</span> : null}
          </div>
        </aside>
      </div>
    </div>
  );
}

// ── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [active, setActive] = React.useState('diagram');
  // per-tab variant index — so cycling stays per-scene
  const [variants, setVariants] = React.useState(() =>
    Object.fromEntries(SCENES.map(s => [s.id, 0]))
  );
  const setVariant = (sceneId) => (i) =>
    setVariants(prev => ({ ...prev, [sceneId]: i }));

  const activeScene = SCENES.find(s => s.id === active);

  return (
    <div className="app" data-screen-label="GM Reference">
      <div className="hd">
        <span className="eyebrow">Call of Cthulhu · Argentine Pampas, 1821 · C3</span>
        <h1>El Ritual Roto <em>— GM reference panels</em></h1>
        <div className="meta">
          <span><b>Wireframe storyboard</b> · low-fi sketches for table reference</span>
          <span style={{ opacity: 0.55 }}>·</span>
          <span>seven scenes + diagram studies</span>
        </div>
        <div className="legend">
          <span className="item"><i className="dot focus" /> Nahuel (focus)</span>
          <span className="item"><i className="dot leader" /> Kuyen</span>
          <span className="item"><i className="dot npc" /> tribe</span>
          <span className="item"><i className="dot pc" /> investigator</span>
          <span className="item"><i className="dot injured" /> injured PC</span>
          <span className="item"><i className="dot stopped" /> stopped</span>
        </div>
      </div>

      <div className="tabs" role="tablist">
        {SCENES.map(s => (
          <button key={s.id} role="tab" aria-selected={active === s.id}
                  className={'tab' + (active === s.id ? ' on' : '')}
                  data-screen-label={`${s.num} ${s.label}`}
                  onClick={() => setActive(s.id)}>
            <Glyph id={s.id} />
            <span className="num">{s.num}</span>
            <span>{s.label}</span>
          </button>
        ))}
      </div>

      {active === 'diagram'
        ? <DiagramPanel ochre={t.ochre} eastGap={t.eastGap}
                        variant={variants.diagram} setVariant={setVariant('diagram')} />
        : <ScenePanel scene={activeScene} ochre={t.ochre} eastGap={t.eastGap}
                      variant={variants[active]} setVariant={setVariant(active)} />}

      <div className="scene-toc">
        <span>El Ritual Roto · GM ref · v.1</span>
        <span>{SCENES.findIndex(s => s.id === active) + 1} / {SCENES.length}</span>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Visual style" />
        <TweakToggle label="Ochre accents" value={t.ochre}
                     onChange={(v) => setTweak('ochre', v)} />
        <TweakToggle label="East-gap highlight" value={t.eastGap}
                     onChange={(v) => setTweak('eastGap', v)} />

        <TweakSection label="Variant — current scene" />
        <TweakRadio
          label="Composition"
          value={variants[active]}
          options={activeScene.variants.map((v, i) => ({ value: i, label: v.vn }))}
          onChange={(i) => setVariant(active)(i)} />
        <div style={{ fontSize: 10.5, color: 'rgba(41,38,27,.55)', lineHeight: 1.5, marginTop: -4 }}>
          {activeScene.variants[variants[active]].label}
        </div>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
