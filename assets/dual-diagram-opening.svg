<?xml version="1.0" encoding="UTF-8"?>
<!--
  THE OPENING - La Tierra Mala
  Triangle pointing UP: radiating outward.
  Pressure points at the three upward hexagram vertices (Marta presses these at the carved stone, C5).
  Companion: dual-diagram.svg, dual-diagram-closing.svg, dual-diagram-anchor.svg
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="parchment" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#f4ecd8"/>
      <stop offset="80%" stop-color="#e8dcc0"/>
      <stop offset="100%" stop-color="#cbb88f"/>
    </radialGradient>
    <filter id="age" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.25  0 0 0 0 0.18  0 0 0 0 0.10  0 0 0 0.08 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <rect width="800" height="800" fill="url(#parchment)"/>
  <rect width="800" height="800" fill="#000" opacity="0.04" filter="url(#age)"/>

  <g transform="translate(400 400)">

    <g stroke="#1f1610" fill="none" opacity="0.12" stroke-linecap="round">
      <circle r="350" stroke-width="2"/>
      <polygon points="0,260 225.2,-130 -225.2,-130" stroke-width="1.5"/>
    </g>

    <g stroke="#8b5a2b" stroke-width="1.2" opacity="0.45" fill="none" stroke-linecap="round">
      <line x1="0" y1="0" x2="0" y2="-350"/>
      <line x1="0" y1="0" x2="303.1" y2="-175"/>
      <line x1="0" y1="0" x2="-303.1" y2="-175"/>
    </g>

    <g stroke="#8b2500" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="0,-260 225.2,130 -225.2,130" stroke-width="5"/>
      <g stroke-width="2.5" opacity="0.7">
        <line x1="0" y1="-260" x2="0" y2="-295"/>
        <line x1="225.2" y1="130" x2="255" y2="147"/>
        <line x1="-225.2" y1="130" x2="-255" y2="147"/>
      </g>
    </g>

    <g>
      <circle cx="0" cy="-260" r="16" fill="#f4ecd8" stroke="#8b2500" stroke-width="3"/>
      <circle cx="0" cy="-260" r="5" fill="#8b2500"/>
      <circle cx="225.2" cy="130" r="16" fill="#f4ecd8" stroke="#8b2500" stroke-width="3"/>
      <circle cx="225.2" cy="130" r="5" fill="#8b2500"/>
      <circle cx="-225.2" cy="130" r="16" fill="#f4ecd8" stroke="#8b2500" stroke-width="3"/>
      <circle cx="-225.2" cy="130" r="5" fill="#8b2500"/>
    </g>

    <circle cx="0" cy="0" r="6" fill="#1f1610" opacity="0.15"/>
  </g>

  <g font-family="Georgia, 'Times New Roman', serif" fill="#1f1610">
    <text x="400" y="42" text-anchor="middle" font-size="14" font-style="italic" letter-spacing="2" opacity="0.9">APERTURA</text>
    <text x="400" y="64" text-anchor="middle" font-size="10" letter-spacing="1" opacity="0.55">el tri&#225;ngulo que abre &#183; los tres puntos de presi&#243;n</text>
    <text x="400" y="772" text-anchor="middle" font-size="10" font-style="italic" opacity="0.5">Radiat ad exteriora</text>
  </g>
</svg>
