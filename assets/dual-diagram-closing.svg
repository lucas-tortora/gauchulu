<?xml version="1.0" encoding="UTF-8"?>
<!--
  THE CLOSING / BINDING - La Tierra Mala
  Outer ring with twelve stations; triangle pointing DOWN converges inward.
  Companion: dual-diagram.svg, dual-diagram-opening.svg, dual-diagram-anchor.svg
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="parchment" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#f4ecd8"/>
      <stop offset="80%" stop-color="#e8dcc0"/>
      <stop offset="100%" stop-color="#cbb88f"/>
    </radialGradient>
    <filter id="age" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.25  0 0 0 0 0.18  0 0 0 0 0.10  0 0 0 0.08 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <rect width="800" height="800" fill="url(#parchment)"/>
  <rect width="800" height="800" fill="#000" opacity="0.04" filter="url(#age)"/>

  <g transform="translate(400 400)" stroke="#1f1610" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <g opacity="0.1">
      <polygon points="0,-260 225.2,130 -225.2,130" stroke-width="2"/>
    </g>

    <g stroke="#1a3d2e">
      <circle r="350" stroke-width="5"/>
      <circle r="320" stroke-width="1.5" stroke-dasharray="4 6" opacity="0.65"/>
    </g>

    <g fill="#1a3d2e">
      <circle cx="0" cy="-350" r="6"/>
      <circle cx="175" cy="-303.1" r="5"/>
      <circle cx="303.1" cy="-175" r="5"/>
      <circle cx="350" cy="0" r="6"/>
      <circle cx="303.1" cy="175" r="5"/>
      <circle cx="175" cy="303.1" r="5"/>
      <circle cx="0" cy="350" r="6"/>
      <circle cx="-175" cy="303.1" r="5"/>
      <circle cx="-303.1" cy="175" r="5"/>
      <circle cx="-350" cy="0" r="6"/>
      <circle cx="-303.1" cy="-175" r="5"/>
      <circle cx="-175" cy="-303.1" r="5"/>
    </g>

    <g stroke="#1a3d2e" stroke-width="3">
      <line x1="0" y1="-350" x2="0" y2="-385"/>
      <line x1="-12" y1="-372" x2="12" y2="-372"/>
      <line x1="350" y1="0" x2="385" y2="0"/>
      <line x1="372" y1="-12" x2="372" y2="12"/>
      <line x1="0" y1="350" x2="0" y2="385"/>
      <line x1="-12" y1="372" x2="12" y2="372"/>
      <line x1="-350" y1="0" x2="-385" y2="0"/>
      <line x1="-372" y1="-12" x2="-372" y2="12"/>
    </g>

    <g stroke="#1a3d2e" stroke-width="2" fill="none">
      <g transform="translate(247.5 -247.5) rotate(-45)">
        <polyline points="-18,0 -9,-9 0,0 9,-9 18,0"/>
        <polyline points="-12,8 -6,2 0,8 6,2 12,8"/>
      </g>
      <g transform="translate(247.5 247.5) rotate(45)">
        <polyline points="-18,0 -9,-9 0,0 9,-9 18,0"/>
        <polyline points="-12,8 -6,2 0,8 6,2 12,8"/>
      </g>
      <g transform="translate(-247.5 247.5) rotate(-45)">
        <polyline points="-18,0 -9,-9 0,0 9,-9 18,0"/>
        <polyline points="-12,8 -6,2 0,8 6,2 12,8"/>
      </g>
      <g transform="translate(-247.5 -247.5) rotate(45)">
        <polyline points="-18,0 -9,-9 0,0 9,-9 18,0"/>
        <polyline points="-12,8 -6,2 0,8 6,2 12,8"/>
      </g>
    </g>

    <polygon points="0,260 225.2,-130 -225.2,-130" stroke="#1a3d2e" stroke-width="5" fill="none"/>

    <g stroke="#1a3d2e" stroke-width="1.2" opacity="0.55">
      <line x1="0" y1="0" x2="0" y2="-350"/>
      <line x1="0" y1="0" x2="303.1" y2="-175"/>
      <line x1="0" y1="0" x2="303.1" y2="175"/>
      <line x1="0" y1="0" x2="0" y2="350"/>
      <line x1="0" y1="0" x2="-303.1" y2="175"/>
      <line x1="0" y1="0" x2="-303.1" y2="-175"/>
    </g>

    <polygon points="0,-130 112.6,-65 112.6,65 0,130 -112.6,65 -112.6,-65" stroke="#1a3d2e" stroke-width="2.5" fill="none"/>

    <path d="M 303.1 -175 A 350 350 0 0 1 303.1 175" stroke="#8b2500" stroke-width="3" fill="none" opacity="0.55" stroke-dasharray="8 6"/>
  </g>

  <g font-family="Georgia, 'Times New Roman', serif" fill="#1f1610">
    <text x="400" y="42" text-anchor="middle" font-size="14" font-style="italic" letter-spacing="2" opacity="0.9">CIERRE</text>
    <text x="400" y="64" text-anchor="middle" font-size="10" letter-spacing="1" opacity="0.55">el anillo de sujeci&#243;n &#183; el tri&#225;ngulo que cierra</text>
    <text x="400" y="748" text-anchor="middle" font-size="9" fill="#8b2500" opacity="0.65">arco oriental - el lado que cede primero</text>
    <text x="400" y="772" text-anchor="middle" font-size="10" font-style="italic" opacity="0.5">Convergit ad centrum</text>
  </g>
</svg>
