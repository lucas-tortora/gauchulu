<?xml version="1.0" encoding="UTF-8"?>
<!--
  THE MARIONETTE RITE - La Tierra Mala (Chapter 1, found in C1 endgame
  or later when investigators force the locked study)

  A page from the colonial-era Jesuit manuscript Don Eusebio found in his
  wall cavity three years ago. Latin body text in the original 18th-century
  hand; Don Eusebio's marginalia and recopying notes scrawled in dark ink
  in his own hurried Spanish.

  The rite is a LOW-LEVEL DERIVATIVE of the dual diagram: it uses only a
  fragment of the OPENING aspect (one anchor, one spoke, one arc, the
  vesica tilted east). Operating a fresh corpse as a marionette of meat
  and pressure - the same mechanism as the reanimated cattle at the pit,
  reduced to something a single practitioner can perform in an evening.

  It does not give life. It gives motion. The body obeys angle, not
  intent. Lasts until sunrise. Costs SAN. Requires soil from a place
  where the geometry has been laid (the pit).

  Players can find this in Don Eusebio's locked study (after C1 endgame
  or later) and may attempt to use it. It IS performable. They will pay
  for it. And every time it is performed, El Patron knows their hand
  better.

  Print at A4 portrait. Show as a recovered page - the players are
  reading what Don Eusebio read three years ago, before he understood.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 620 880"
     width="620" height="880"
     font-family="Georgia, 'Times New Roman', serif">

  <defs>
    <radialGradient id="parchment" cx="50%" cy="48%" r="62%">
      <stop offset="0%"  stop-color="#f3e8c8"/>
      <stop offset="60%" stop-color="#e6d6ad"/>
      <stop offset="100%" stop-color="#b89a64"/>
    </radialGradient>

    <filter id="age" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="6"/>
      <feColorMatrix values="0 0 0 0 0.20  0 0 0 0 0.13  0 0 0 0 0.06  0 0 0 0.10 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>

    <filter id="foxing" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" seed="14"/>
      <feColorMatrix values="0 0 0 0 0.42  0 0 0 0 0.20  0 0 0 0 0.04  0 0 0 0.18 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- ==================== parchment ==================== -->
  <rect width="620" height="880" fill="url(#parchment)"/>
  <rect width="620" height="880" fill="#000" opacity="0.06" filter="url(#age)"/>
  <rect width="620" height="880" fill="#3a1f08" opacity="0.5" filter="url(#foxing)"/>

  <!-- torn upper-right corner -->
  <polygon points="620,0 620,38 588,12 600,0" fill="#1a1208" opacity="0.85"/>
  <polygon points="620,0 620,8 612,0" fill="#0a0604"/>

  <!-- worm holes -->
  <g fill="#1a1208" opacity="0.6">
    <ellipse cx="92"  cy="120" rx="2.4" ry="1.6"/>
    <ellipse cx="412" cy="540" rx="2"   ry="1.4"/>
    <ellipse cx="180" cy="780" rx="1.8" ry="1.2"/>
  </g>

  <!-- ==================== TITLE ==================== -->
  <text x="310" y="58" text-anchor="middle" fill="#1a1208" font-size="16"
        letter-spacing="3" font-style="italic">
    DE OPERATIONE CORPORVM RECENTIVM
  </text>
  <line x1="120" y1="74" x2="500" y2="74" stroke="#1a1208" stroke-width="0.7" opacity="0.7"/>
  <text x="310" y="92" text-anchor="middle" fill="#3a1f08" font-size="10" font-style="italic">
    de la operaci&#243;n de los cuerpos recientes
  </text>
  <text x="310" y="108" text-anchor="middle" fill="#3a1f08" font-size="9.5" font-style="italic">
    para mover a los muertos &#8212; no para revivirlos
  </text>

  <!-- title rule (decorative) -->
  <g transform="translate(310 124)" stroke="#1a1208" stroke-width="0.7" fill="none">
    <line x1="-60" y1="0" x2="60" y2="0"/>
    <circle cx="0" cy="0" r="2.4" fill="#1a1208"/>
    <line x1="-72" y1="-3" x2="-66" y2="0"/>
    <line x1="-72" y1="3"  x2="-66" y2="0"/>
    <line x1="72"  y1="-3" x2="66" y2="0"/>
    <line x1="72"  y1="3"  x2="66" y2="0"/>
  </g>

  <!-- ==================== LEFT COLUMN: the fragment-geometry ==================== -->
  <!-- Centered at (170, 280). The whole figure is small, ~120 across.
       Fragment of the opening aspect: one anchor, one east spoke, eastern
       arc only, vesica tilted east. -->

  <g transform="translate(170 280)" stroke="#1a1208" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- the partial outer arc - east only -->
    <path d="M 0,-100 A 100 100 0 0 1 0,100" stroke-width="1.4"/>
    <!-- a few stations on the eastern arc (not all twelve - just three) -->
    <g fill="#1a1208" stroke="none">
      <circle cx="50"  cy="-86.6" r="2"/>
      <circle cx="100" cy="0" r="2.4"/>
      <circle cx="50"  cy="86.6" r="2"/>
    </g>
    <!-- the broken/erased western half: a faint ghost arc -->
    <path d="M 0,-100 A 100 100 0 0 0 0,100" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.45"/>

    <!-- single radial spoke: east, from anchor to east station -->
    <line x1="14" y1="0" x2="100" y2="0" stroke-width="1.3"/>

    <!-- the vesica piscis - tilted east (not centered; this is the
         opening aspect's "doorway" oriented outward) -->
    <ellipse cx="14" cy="0" rx="22" ry="12" stroke-width="1.2" transform="rotate(0)"/>

    <!-- triangle UP (opening) - drawn faintly, only the eastern half
         of the figure is present -->
    <polyline points="0,-78 67.5,39" stroke-width="1.0"/>
    <polyline points="67.5,39 -67.5,39" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.5"/>
    <polyline points="-67.5,39 0,-78" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.5"/>

    <!-- center anchor -->
    <circle cx="0" cy="0" r="3.4" fill="#1a1208" stroke="none"/>
    <circle cx="0" cy="0" r="9" stroke-width="0.7" stroke-dasharray="2 3" opacity="0.7"/>

    <!-- a tiny lemniscate / pendulum mark above the anchor: the
         operator's "place" (where the practitioner stands) -->
    <g transform="translate(0,-28)" stroke-width="0.8">
      <path d="M -8,0 q 4,-6 8,0 q 4,6 8,0 q -4,6 -8,0 q -4,-6 -8,0"/>
    </g>

    <!-- station labels (Latin, tiny) -->
    <g font-size="7" fill="#1a1208" font-style="italic" stroke="none">
      <text x="105" y="3">ostium</text>
      <text x="55"  y="-92">caput</text>
      <text x="55"  y="98">pes</text>
      <text x="-12" y="-110" text-anchor="middle">(occidens &#8212; abscissus)</text>
    </g>
  </g>

  <!-- LEFT figure caption -->
  <text x="170" y="430" text-anchor="middle" font-size="8.5" fill="#1a1208" font-style="italic" letter-spacing="0.6">
    Figura I. &#8212; fragmentum apertionis
  </text>
  <text x="170" y="442" text-anchor="middle" font-size="8" fill="#3a1f08" letter-spacing="0.3">
    una parte del dibujo. la mas peque&#241;a que sirve.
  </text>

  <!-- ==================== RIGHT COLUMN: body diagram ==================== -->
  <!-- Centered roughly at (450, 290). A supine male figure. Bind-points
       at heart, throat, palms, soles. -->

  <g transform="translate(450 290)" stroke="#1a1208" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- body outline -->
    <!-- head -->
    <ellipse cx="0" cy="-110" rx="22" ry="26" stroke-width="1"/>
    <!-- torso -->
    <path d="M -22,-86 Q -32,-50 -34,0 L -34,40 L -28,80 L -10,84 L -10,40 L 10,40 L 10,84 L 28,80 L 34,40 L 34,0 Q 32,-50 22,-86 Z" stroke-width="1"/>
    <!-- arms -->
    <path d="M -34,-50 L -68,30 L -76,90 L -64,92 L -54,40 L -34,-10" stroke-width="1"/>
    <path d="M  34,-50 L  68,30 L  76,90 L  64,92 L  54,40 L  34,-10" stroke-width="1"/>
    <!-- hands (open palms) -->
    <ellipse cx="-72" cy="92" rx="9" ry="6" stroke-width="0.9"/>
    <ellipse cx="72"  cy="92" rx="9" ry="6" stroke-width="0.9"/>
    <!-- legs -->
    <path d="M -10,84 L -16,160 L -22,210 L -10,212 L -4,160" stroke-width="1"/>
    <path d="M  10,84 L  16,160 L  22,210 L  10,212 L  4,160" stroke-width="1"/>
    <!-- feet (soles - soles up since supine) -->
    <ellipse cx="-15" cy="218" rx="11" ry="5" stroke-width="0.9"/>
    <ellipse cx="15"  cy="218" rx="11" ry="5" stroke-width="0.9"/>

    <!-- closed eyes (X marks - 'the corpse does not see, this is correct') -->
    <g stroke-width="0.9">
      <line x1="-12" y1="-118" x2="-4" y2="-110"/>
      <line x1="-12" y1="-110" x2="-4" y2="-118"/>
      <line x1="4"   y1="-118" x2="12" y2="-110"/>
      <line x1="4"   y1="-110" x2="12" y2="-118"/>
    </g>

    <!-- BIND-POINTS - the seven anchors of the marionette.
         Each is a small filled circle with a number. -->
    <g>
      <!-- 1: throat -->
      <circle cx="0" cy="-78" r="4" fill="#1a1208"/>
      <text x="9" y="-74" font-size="8" fill="#1a1208" font-style="italic" stroke="none">i</text>
      <!-- 2: heart -->
      <circle cx="-6" cy="-30" r="4.5" fill="#1a1208"/>
      <text x="3" y="-26" font-size="8" fill="#1a1208" font-style="italic" stroke="none">ii</text>
      <!-- 3: navel (the anchor) - a slightly larger ring -->
      <circle cx="0" cy="14" r="6" fill="none" stroke-width="1.2"/>
      <circle cx="0" cy="14" r="2.4" fill="#1a1208"/>
      <text x="9" y="18" font-size="8" fill="#1a1208" font-style="italic" stroke="none">iii (umbilicus)</text>
      <!-- 4: left palm -->
      <circle cx="-72" cy="92" r="3.6" fill="#1a1208"/>
      <text x="-92" y="106" font-size="8" fill="#1a1208" font-style="italic" stroke="none">iv</text>
      <!-- 5: right palm -->
      <circle cx="72" cy="92" r="3.6" fill="#1a1208"/>
      <text x="80" y="106" font-size="8" fill="#1a1208" font-style="italic" stroke="none">v</text>
      <!-- 6: left sole -->
      <circle cx="-15" cy="218" r="3.6" fill="#1a1208"/>
      <text x="-32" y="232" font-size="8" fill="#1a1208" font-style="italic" stroke="none">vi</text>
      <!-- 7: right sole -->
      <circle cx="15" cy="218" r="3.6" fill="#1a1208"/>
      <text x="22" y="232" font-size="8" fill="#1a1208" font-style="italic" stroke="none">vii</text>
    </g>

    <!-- east-pointing arrow from the navel (the anchor) - the body is
         oriented to the east; the spoke from Figure I terminates here -->
    <g stroke-width="0.7" stroke-dasharray="3 3" opacity="0.7">
      <line x1="0" y1="14" x2="60" y2="14"/>
      <polygon points="60,14 56,11 56,17" fill="#1a1208" stroke="none"/>
    </g>
  </g>

  <!-- RIGHT figure caption -->
  <text x="450" y="540" text-anchor="middle" font-size="8.5" fill="#1a1208" font-style="italic" letter-spacing="0.6">
    Figura II. &#8212; septem ligamina
  </text>
  <text x="450" y="552" text-anchor="middle" font-size="8" fill="#3a1f08" letter-spacing="0.3">
    siete ataduras. el cuerpo se orienta hacia el este.
  </text>

  <!-- ==================== leader lines connecting Fig I to Fig II ==================== -->
  <g stroke="#1a1208" stroke-width="0.5" fill="none" stroke-dasharray="1.6 2.6" opacity="0.55">
    <path d="M 270 290 Q 360 280 416 304"/>
  </g>

  <!-- ==================== INSTRUCTIONS (lower half) ==================== -->
  <g transform="translate(60 580)" fill="#1a1208" font-size="10.5">
    <text x="0" y="0" font-style="italic" letter-spacing="0.6" font-size="11">DE MODO OPERANDI &#183; del modo de hacerlo</text>
    <line x1="0" y1="6" x2="500" y2="6" stroke="#1a1208" stroke-width="0.5" opacity="0.6"/>

    <text x="0" y="24"><tspan font-style="italic">i.</tspan> tomar tierra del pozo abierto. una mano. nada mas.</text>
    <text x="0" y="40"><tspan font-style="italic">ii.</tspan> el cuerpo ha de ser reciente. menos de un dia.</text>
    <text x="0" y="56"><tspan font-style="italic">iii.</tspan> rascar la <tspan font-style="italic">figura I</tspan> en el suelo. el ostium hacia el oriente.</text>
    <text x="0" y="72"><tspan font-style="italic">iv.</tspan> tender el cuerpo sobre la figura. <tspan font-style="italic">umbilicus</tspan> en el ancla.</text>
    <text x="0" y="88"><tspan font-style="italic">v.</tspan> espolvorear tierra en las siete ataduras. en orden. i. ii. iii. iv. v. vi. vii.</text>
    <text x="0" y="104"><tspan font-style="italic">vi.</tspan> esperar. no hablar al cuerpo. no nombrarlo. no preguntar.</text>
    <text x="0" y="120"><tspan font-style="italic">vii.</tspan> al alba se acaba. recoger la tierra. enterrarla. callar.</text>
  </g>

  <!-- ==================== FOOTNOTE LATIN (very small, italic) ==================== -->
  <text x="310" y="780" text-anchor="middle" font-size="9" fill="#1a1208" font-style="italic">
    Hoc opus minimum est. Quod aperitur, non hoc clauditur.
  </text>
  <text x="310" y="794" text-anchor="middle" font-size="8" fill="#3a1f08" font-style="italic" opacity="0.85">
    "esta es la obra mas peque&#241;a. lo que abre, esto no cierra."
  </text>

  <!-- ==================== EUSEBIO'S MARGINALIA ==================== -->
  <!-- A more frantic, looser hand. Different ink (slightly bluer-black).
       Scattered around the margins - top-right, lower-left, between
       columns. -->

  <g font-family="'Brush Script MT', 'Snell Roundhand', cursive"
     fill="#0a1a3a" font-style="italic">

    <!-- top-right note (next to the title, in a tilted angle) -->
    <g transform="translate(490 140) rotate(-6)">
      <text x="0" y="0"   font-size="14">necesito tierra del pozo &#8212;</text>
      <text x="0" y="16"  font-size="14">cada vez mas profunda</text>
    </g>

    <!-- between columns, vertical, beside Figure I -->
    <g transform="translate(295 250) rotate(-90)">
      <text x="0" y="0" font-size="13">dur&#243; hasta el alba.</text>
    </g>

    <!-- below Figure II, scrawled across the leader line -->
    <g transform="translate(360 510) rotate(4)">
      <text x="0" y="0" font-size="14">se mueve. no obedece.</text>
    </g>

    <!-- lower-left corner, beside the instructions -->
    <g transform="translate(40 770) rotate(-4)">
      <text x="0" y="0"  font-size="14">&#8212; me mira</text>
      <text x="0" y="18" font-size="14">&#8212; no me mira a m&#237;</text>
    </g>

    <!-- a single very small note next to instruction vi -->
    <g transform="translate(380 668) rotate(2)">
      <text x="0" y="0" font-size="11">&#191;qui&#233;n contesta si lo nombro?</text>
    </g>

    <!-- a number tally near the foot - the count of uses -->
    <g transform="translate(540 800)">
      <text x="0" y="0" font-size="13">|||| |||| ||</text>
    </g>
  </g>

  <!-- ==================== ink blots ==================== -->
  <g fill="#0a1a3a" opacity="0.85">
    <ellipse cx="80"  cy="540" rx="3.6" ry="2.4"/>
    <ellipse cx="84"  cy="544" rx="1.4" ry="1"/>
    <ellipse cx="552" cy="610" rx="4"  ry="2.6"/>
    <ellipse cx="558" cy="616" rx="1.8" ry="1.1"/>
    <ellipse cx="220" cy="720" rx="2.4" ry="1.6"/>
  </g>

  <!-- a small smudge where a finger pressed wet ink (Eusebio's, recent) -->
  <ellipse cx="160" cy="820" rx="14" ry="6" fill="#0a1a3a" opacity="0.18"/>

  <!-- ==================== bottom rubric / archive mark ==================== -->
  <g transform="translate(40 850)" fill="#3a1f08">
    <text x="0" y="0" font-size="8" font-style="italic" letter-spacing="0.4">
      [folio recuperado del estudio cerrado del Sr. Valdez &#183; sin foliar]
    </text>
  </g>
  <g transform="translate(580 850)" fill="#3a1f08" text-anchor="end">
    <text x="0" y="0" font-size="8" font-style="italic" letter-spacing="0.4">
      M.S. de Saenz, S.I. &#8212; c. 1763
    </text>
  </g>

</svg>
