<?xml version="1.0" encoding="UTF-8"?>
<!--
  THE GRAVEYARD KISS (Create Zombie variant) - La Tierra Mala
  Folio from Don Eusebio's locked study (copy from Saens manuscript).

  Low-level derivative of the OPENING aspect: eastern fragment traced in blood.
  Not a major working. A pet rite.

  Mechanics (keeper): POW roll; cost 5 POW + 1D10 SAN + 10 HP (split among casters);
  corpse needs sufficient flesh; 1d4 simple commands on success; zombie 10 HP.

  Print A4 portrait. Show as recovered page.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 620 880"
     width="620" height="880"
     font-family="Georgia, 'Times New Roman', serif">

  <defs>
    <radialGradient id="parchment" cx="50%" cy="48%" r="62%">
      <stop offset="0%"  stop-color="#f3e8c8"/>
      <stop offset="60%" stop-color="#e6d6ad"/>
      <stop offset="100%" stop-color="#b89a64"/>
    </radialGradient>

    <filter id="age" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="6"/>
      <feColorMatrix values="0 0 0 0 0.20  0 0 0 0 0.13  0 0 0 0 0.06  0 0 0 0.10 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>

    <filter id="foxing" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" seed="14"/>
      <feColorMatrix values="0 0 0 0 0.42  0 0 0 0 0.20  0 0 0 0 0.04  0 0 0 0.18 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <rect width="620" height="880" fill="url(#parchment)"/>
  <rect width="620" height="880" fill="#000" opacity="0.06" filter="url(#age)"/>
  <rect width="620" height="880" fill="#3a1f08" opacity="0.5" filter="url(#foxing)"/>

  <polygon points="620,0 620,38 588,12 600,0" fill="#1a1208" opacity="0.85"/>
  <polygon points="620,0 620,8 612,0" fill="#0a0604"/>

  <g fill="#1a1208" opacity="0.6">
    <ellipse cx="92"  cy="120" rx="2.4" ry="1.6"/>
    <ellipse cx="412" cy="540" rx="2"   ry="1.4"/>
    <ellipse cx="180" cy="780" rx="1.8" ry="1.2"/>
  </g>

  <!-- TITLE -->
  <text x="310" y="54" text-anchor="middle" fill="#1a1208" font-size="16"
        letter-spacing="3" font-style="italic">
    DE OSCULO SEPULCRALI
  </text>
  <line x1="120" y1="70" x2="500" y2="70" stroke="#1a1208" stroke-width="0.7" opacity="0.7"/>
 
  <g transform="translate(310 120)" stroke="#1a1208" stroke-width="0.7" fill="none">
    <line x1="-60" y1="0" x2="60" y2="0"/>
    <circle cx="0" cy="0" r="2.4" fill="#1a1208"/>
  </g>

  <!-- LEFT: blood diagram (eastern opening fragment) -->
  <g transform="translate(170 285)" stroke="#6b1010" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 0,-95 A 95 95 0 0 1 0,95" stroke-width="2.2"/>
    <g fill="#6b1010" stroke="none">
      <circle cx="48"  cy="-82" r="2.2"/>
      <circle cx="95" cy="0" r="2.6"/>
      <circle cx="48"  cy="82" r="2.2"/>
    </g>
    <path d="M 0,-95 A 95 95 0 0 0 0,95" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.35" stroke="#3a1f08"/>
    <line x1="12" y1="0" x2="95" y2="0" stroke-width="1.8"/>
    <ellipse cx="12" cy="0" rx="20" ry="11" stroke-width="1.6"/>
    <polyline points="0,-74 64,37" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="3.2" fill="#6b1010" stroke="none"/>
    <circle cx="0" cy="0" r="8" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.65"/>
    <!-- blood drip marks -->
    <g fill="#6b1010" stroke="none" opacity="0.75">
      <ellipse cx="72" cy="18" rx="2.5" ry="4"/>
      <ellipse cx="78" cy="28" rx="1.8" ry="3"/>
      <ellipse cx="-8" cy="88" rx="2" ry="3.5"/>
    </g>
    <g font-size="7" fill="#4a0808" font-style="italic" stroke="none">
      <text x="100" y="3">ostium</text>
      <text x="-14" y="-104" text-anchor="middle">in sanguine</text>
    </g>
  </g>

  <text x="170" y="420" text-anchor="middle" font-size="8.5" fill="#1a1208" font-style="italic">
    Figura I. &#8212; fragmentum apertionis (sanguine)
  </text>
  <text x="170" y="432" text-anchor="middle" font-size="8" fill="#3a1f08">
    el dibujo se hace en sangre. el ostium al oriente.
  </text>

  <!-- RIGHT: corpse, mouth focus -->
  <g transform="translate(450 285)" stroke="#1a1208" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="0" cy="-108" rx="21" ry="25" stroke-width="1"/>
    <path d="M -21,-84 Q -30,-48 -32,0 L -32,38 L -26,76 L -10,80 L -10,36 L 10,36 L 10,80 L 26,76 L 32,38 L 32,0 Q 30,-48 21,-84 Z" stroke-width="1"/>
    <path d="M -32,-48 L -66,28 L -74,86 L -62,88 L -52,38 L -32,-8" stroke-width="1"/>
    <path d="M  32,-48 L  66,28 L  74,86 L  62,88 L  52,38 L  32,-8" stroke-width="1"/>
    <path d="M -10,80 L -16,154 L -22,202 L -10,204 L -4,154" stroke-width="1"/>
    <path d="M  10,80 L  16,154 L  22,202 L  10,204 L  4,154" stroke-width="1"/>

    <!-- closed eyes -->
    <g stroke-width="0.9">
      <line x1="-11" y1="-116" x2="-3" y2="-108"/>
      <line x1="-11" y1="-108" x2="-3" y2="-116"/>
      <line x1="3"  y1="-116" x2="11" y2="-108"/>
      <line x1="3"  y1="-108" x2="11" y2="-116"/>
    </g>

    <!-- mouth: parted, blood inside -->
    <path d="M -10,-92 Q 0,-84 10,-92" stroke-width="1.1"/>
    <ellipse cx="0" cy="-88" rx="7" ry="4" fill="#6b1010" opacity="0.55" stroke="#6b1010" stroke-width="0.8"/>
    <text x="0" y="-86" text-anchor="middle" font-size="6" fill="#f3e8c8" stroke="none" font-style="italic">sanguis</text>

    <!-- operator silhouette at head: kiss / breath -->
    <g transform="translate(0,-108)" opacity="0.55">
      <ellipse cx="0" cy="-28" rx="18" ry="22" stroke-width="0.8" stroke-dasharray="2 2"/>
      <path d="M -6,-18 Q 0,-8 6,-18" stroke-width="0.7" stroke="#6b1010"/>
      <path d="M 0,-14 C -8,-4 -8,8 0,14 C 8,8 8,-4 0,-14" stroke-width="0.6" stroke-dasharray="1.5 2" fill="none" stroke="#4a0808"/>
      <text x="0" y="-48" text-anchor="middle" font-size="7" fill="#3a1f08" font-style="italic" stroke="none">spiritus</text>
    </g>

    <!-- umbilicus on diagram alignment -->
    <circle cx="0" cy="12" r="5" fill="none" stroke-width="1"/>
    <circle cx="0" cy="12" r="2" fill="#1a1208"/>
  </g>

  <text x="450" y="530" text-anchor="middle" font-size="8.5" fill="#1a1208" font-style="italic">
    Figura II. &#8212; os cum sanguine et osculo
  </text>
  <text x="450" y="542" text-anchor="middle" font-size="8" fill="#3a1f08">
    una onza de sangre en la boca. luego el beso. luego el aliento.
  </text>

  <g stroke="#1a1208" stroke-width="0.5" fill="none" stroke-dasharray="1.6 2.6" opacity="0.5">
    <path d="M 265 300 Q 355 290 410 310"/>
  </g>

  <!-- COST BOX -->
  <g transform="translate(60 565)">
    <rect x="0" y="0" width="500" height="52" fill="#e6d6ad" stroke="#1a1208" stroke-width="0.6" opacity="0.85"/>
    <text x="250" y="16" text-anchor="middle" font-size="9" fill="#1a1208" font-style="italic" letter-spacing="0.5">
      PRETIVM &#183; costo del operador
    </text>
    <text x="250" y="32" text-anchor="middle" font-size="9.5" fill="#1a1208">
      V POW permanens &#183; 1D10 mentis &#183; X PV (decem, inter participes)
    </text>
    <text x="250" y="46" text-anchor="middle" font-size="8.5" fill="#3a1f08" font-style="italic">
      tirada de POW. &#233;xito: 1D4 mandata simplicia.
    </text>
  </g>

  <!-- INSTRUCTIONS -->
  <g transform="translate(60 635)" fill="#1a1208" font-size="10.5">
    <text x="0" y="0" font-style="italic" letter-spacing="0.6" font-size="11">DE MODO OPERANDI</text>
    <line x1="0" y1="6" x2="500" y2="6" stroke="#1a1208" stroke-width="0.5" opacity="0.6"/>

    <text x="0" y="24"><tspan font-style="italic">i.</tspan> cuerpo humano con carne suficiente para moverse despu&#233;s.</text>
    <text x="0" y="40"><tspan font-style="italic">ii.</tspan> trazar la <tspan font-style="italic">figura I</tspan> en sangre. ostium al oriente.</text>
    <text x="0" y="56"><tspan font-style="italic">iii.</tspan> tender el cuerpo sobre el dibujo. ombligo en el ancla.</text>
    <text x="0" y="72"><tspan font-style="italic">iv.</tspan> una onza de sangre propia en la boca del muerto.</text>
    <text x="0" y="88"><tspan font-style="italic">v.</tspan> besar los labios. exhalar parte del yo en el cuerpo.</text>
    <text x="0" y="104"><tspan font-style="italic">vi.</tspan> cinco puntos de POW se pierden &#8212; don al cad&#225;ver.</text>
    <text x="0" y="120"><tspan font-style="italic">vii.</tspan> si la tirada de POW tiene &#233;xito: dar 1D4 &#243;rdenes.</text>
  </g>

  <text x="310" y="790" text-anchor="middle" font-size="9" fill="#1a1208" font-style="italic">
    Hoc opus minimum est. Quod aperitur, non hoc clauditur.
  </text>
  <text x="310" y="804" text-anchor="middle" font-size="8" fill="#3a1f08" font-style="italic" opacity="0.85">
    "esta es la obra m&#225;s peque&#241;a. lo que abre, esto no cierra."
  </text>

  <!-- EUSEBIO MARGINALIA -->
  <g font-family="'Brush Script MT', 'Snell Roundhand', cursive" fill="#0a1a3a" font-style="italic">
    <g transform="translate(488 135) rotate(-6)">
      <text x="0" y="0"  font-size="14">cinco de POW &#8212; hueco</text>
      <text x="0" y="16" font-size="14">despu&#233;s</text>
    </g>
    <g transform="translate(300 248) rotate(-90)">
      <text x="0" y="0" font-size="13">obedece.</text>
    </g>
    <g transform="translate(355 505) rotate(4)">
      <text x="0" y="0" font-size="14">tres mandatos. se detuvo.</text>
    </g>
    <g transform="translate(38 755) rotate(-4)">
      <text x="0" y="0"  font-size="14">&#8212; el beso</text>
      <text x="0" y="18" font-size="14">&#8212; no es un beso</text>
    </g>
    <g transform="translate(375 718) rotate(2)">
      <text x="0" y="0" font-size="11">diez PV entre nosotros</text>
    </g>
    <g transform="translate(538 798)">
      <text x="0" y="0" font-size="13">|||| |||</text>
    </g>
  </g>

  <g fill="#6b1010" opacity="0.7">
    <ellipse cx="78"  cy="538" rx="3.2" ry="2.2"/>
    <ellipse cx="548" cy="608" rx="3.8" ry="2.4"/>
    <ellipse cx="218" cy="718" rx="2.2" ry="1.4"/>
  </g>
  <ellipse cx="158" cy="818" rx="14" ry="6" fill="#0a1a3a" opacity="0.18"/>

  <g transform="translate(40 850)" fill="#3a1f08">
    <text x="0" y="0" font-size="8" font-style="italic">[folio del estudio cerrado del Sr. Valdez]</text>
  </g>
  <g transform="translate(580 850)" fill="#3a1f08" text-anchor="end">
    <text x="0" y="0" font-size="8" font-style="italic">M.S. de Saenz, S.I. &#8212; c. 1763</text>
  </g>

</svg>
