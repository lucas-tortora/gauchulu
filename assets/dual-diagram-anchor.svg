<?xml version="1.0" encoding="UTF-8"?>
<!--
  THE ANCHOR - La Tierra Mala
  Center point: Saens skull, Nahuel knee, ritual focus.
  Vesica piscis: the doorway at the center.
  Companion: dual-diagram.svg, dual-diagram-opening.svg, dual-diagram-closing.svg
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="parchment" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#f4ecd8"/>
      <stop offset="80%" stop-color="#e8dcc0"/>
      <stop offset="100%" stop-color="#cbb88f"/>
    </radialGradient>
    <filter id="age" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.25  0 0 0 0 0.18  0 0 0 0 0.10  0 0 0 0.08 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <rect width="800" height="800" fill="url(#parchment)"/>
  <rect width="800" height="800" fill="#000" opacity="0.04" filter="url(#age)"/>

  <g transform="translate(400 400)">

    <g stroke="#1f1610" fill="none" opacity="0.1" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="0,-260 225.2,130 -225.2,130" stroke-width="1.5"/>
      <polygon points="0,260 225.2,-130 -225.2,-130" stroke-width="1.5"/>
      <polygon points="0,-130 112.6,-65 112.6,65 0,130 -112.6,65 -112.6,-65" stroke-width="1.5"/>
      <circle r="350" stroke-width="1"/>
    </g>

    <g stroke="#4a3728" stroke-width="1" opacity="0.35" fill="none" stroke-linecap="round">
      <line x1="0" y1="-350" x2="0" y2="0"/>
      <line x1="303.1" y1="-175" x2="0" y2="0"/>
      <line x1="303.1" y1="175" x2="0" y2="0"/>
      <line x1="0" y1="350" x2="0" y2="0"/>
      <line x1="-303.1" y1="175" x2="0" y2="0"/>
      <line x1="-303.1" y1="-175" x2="0" y2="0"/>
    </g>

    <g stroke="#4a3728" fill="none" stroke-linecap="round">
      <circle cx="-30" cy="0" r="60" stroke-width="2.5" opacity="0.9"/>
      <circle cx="30" cy="0" r="60" stroke-width="2.5" opacity="0.9"/>
      <path d="M 0 -52 A 60 60 0 0 1 0 52 A 60 60 0 0 1 0 -52 Z" fill="#1f1610" opacity="0.06"/>
    </g>

    <g stroke="#1f1610" fill="#1f1610">
      <circle cx="0" cy="0" r="28" fill="none" stroke-width="2" stroke-dasharray="4 5" opacity="0.75"/>
      <circle cx="0" cy="0" r="18" fill="none" stroke-width="1.5" opacity="0.5"/>
      <circle cx="0" cy="0" r="11" fill="#1f1610"/>
      <circle cx="0" cy="0" r="4" fill="#f4ecd8"/>
    </g>

    <circle cx="0" cy="0" r="130" fill="none" stroke="#4a3728" stroke-width="1.5" stroke-dasharray="3 8" opacity="0.4"/>
  </g>

  <g font-family="Georgia, 'Times New Roman', serif" fill="#1f1610">
    <text x="400" y="42" text-anchor="middle" font-size="14" font-style="italic" letter-spacing="2" opacity="0.9">ANCLA</text>
    <text x="400" y="64" text-anchor="middle" font-size="10" letter-spacing="1" opacity="0.55">el centro &#183; la vesica &#183; donde se arrodilla el foco</text>
    <text x="400" y="772" text-anchor="middle" font-size="10" font-style="italic" opacity="0.5">Hic manet. Hic tenet.</text>
  </g>
</svg>
